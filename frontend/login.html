<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - PrepPilot AI</title>
  
  <!-- Modern Typography (Inter Font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-container">
      
      <!-- Logo Header -->
      <a href="index.html" class="auth-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span>PrepPilot <span class="logo-accent">AI</span></span>
      </a>

      <!-- Form Card -->
      <div class="auth-card">
        <h2 class="auth-card-title">Welcome back</h2>
        <p class="auth-card-subtitle">Log in to manage your preparation workspace.</p>

        <!-- Error / Success Alert Box -->
        <div id="alert-box" class="alert-box hidden"></div>

        <form id="login-form" class="auth-form">
          <!-- Email Address -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>

          <!-- Login Button -->
          <button type="submit" id="btn-submit" class="btn-submit">
            <span>Log In</span>
            <div id="loader" class="loader hidden"></div>
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
